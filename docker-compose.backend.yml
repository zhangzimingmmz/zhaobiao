name: zhaobiao-backend

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: zhaobiao/backend-runtime:local
    env_file:
      - .env.backend
    environment:
      PYTHONPATH: /app
      NOTICES_DB: /app/data/notices.db
    command:
      - python
      - -m
      - uvicorn
      - server.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "${API_PUBLISH_BIND:-127.0.0.1:8000}:8000"
    restart: unless-stopped
    volumes:
      - "${DATA_DIR:-./data}:/app/data"
      - "${LOG_DIR:-./logs}:/app/logs"
    healthcheck:
      test: ["CMD", "python", "/app/scripts/docker/http_probe.py", "http://127.0.0.1:8000/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: zhaobiao/backend-runtime:local
    env_file:
      - .env.backend
    environment:
      PYTHONPATH: /app
      NOTICES_DB: /app/data/notices.db
      API_BASE_URL: "${API_BASE_URL:-http://api:8000}"
    command:
      - supercronic
      - -passthrough-logs
      - /app/deploy/scheduler/crontab
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - "${DATA_DIR:-./data}:/app/data"
      - "${LOG_DIR:-./logs}:/app/logs"

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "${ADMIN_FRONTEND_API_BASE:-http://100.64.0.5:8000}"
    image: zhaobiao/admin-frontend:local
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${ADMIN_FRONTEND_PUBLISH_BIND:-127.0.0.1:8091}:80"
    restart: unless-stopped
